<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b0f1a">
<link rel="manifest" href="/workout/manifest.json">
<link rel="apple-touch-icon" href="/workout/icons/icon-192.png">
<title>Workout Logger</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Surfaces — hex baseline */
  --bg:#0b0f1a;--surf1:#111827;--surf2:#1a2235;--surf3:#212d42;--surf4:#2a3750;
  /* Accent */
  --volt:#d4f500;--volt-dim:#b8d800;
  --volt-subtle:rgba(212,245,0,.08);--volt-border:rgba(212,245,0,.22);
  /* Text */
  --text:#eef2ff;--text2:#8b9ab8;--text3:#4d5f7a;
  /* Borders */
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.14);
  /* Status */
  --red:#f05050;--red-bg:rgba(240,80,80,.1);--green:#4ade80;
  /* Shape */
  --r:10px;--r2:14px;--r3:18px;
  /* Type */
  --ff:'Barlow',system-ui,sans-serif;--ffc:'Barlow Condensed',system-ui,sans-serif;
  /* Motion */
  --tr:all .15s cubic-bezier(.4,0,.2,1);
  /* Safe areas */
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
  --safe-l:env(safe-area-inset-left,0px);--safe-r:env(safe-area-inset-right,0px);
  /* Layout */
  --rail-w:0px;
}
/* oklch upgrade — identical percepts, progressive enhancement */
@supports (color:oklch(0 0 0)){
  :root{
    --bg:oklch(9.5% .028 264);--surf1:oklch(14% .035 264);
    --surf2:oklch(18.5% .045 262);--surf3:oklch(23% .055 260);--surf4:oklch(28% .065 258);
    --volt:oklch(93% .255 107);--volt-dim:oklch(83% .245 107);
    --volt-subtle:oklch(93% .255 107 / 8%);--volt-border:oklch(93% .255 107 / 22%);
    --text:oklch(96% .012 270);--text2:oklch(64% .048 255);--text3:oklch(46% .05 255);
    --border:oklch(100% 0 0 / 7%);--border2:oklch(100% 0 0 / 14%);
    --red:oklch(62% .195 26);--red-bg:oklch(62% .195 26 / 10%);--green:oklch(84% .19 148);
  }
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--ff);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
#app{max-width:560px;margin:0 auto;padding-bottom:calc(max(12px,var(--safe-b)) + 8px);min-height:100dvh}
input,textarea,select{background:var(--surf3);border:1px solid var(--border2);color:var(--text);border-radius:var(--r);padding:11px 13px;font-size:16px;font-family:var(--ff);width:100%;outline:none;transition:var(--tr);-webkit-appearance:none;}
input:focus,textarea:focus{border-color:var(--volt);background:var(--surf4);box-shadow:0 0 0 3px var(--volt-subtle)}
input::placeholder,textarea::placeholder{color:var(--text3)}
input[type=checkbox]{display:none}
.chk{width:26px;height:26px;border-radius:7px;border:2px solid var(--border2);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:var(--tr);touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.chk.on{background:var(--volt);border-color:var(--volt)}
.chk.on::after{content:'';display:block;width:8px;height:5px;border-left:2.5px solid #0b0f1a;border-bottom:2.5px solid #0b0f1a;transform:rotate(-45deg) translateY(-1px)}
button{cursor:pointer;font-family:var(--ff);font-size:13px;font-weight:600;border:1px solid var(--border2);background:var(--surf2);color:var(--text2);border-radius:var(--r);padding:10px 16px;min-height:44px;transition:var(--tr);touch-action:manipulation;letter-spacing:.02em;-webkit-tap-highlight-color:transparent}
button:hover{background:var(--surf3);color:var(--text)}
button:active{transform:scale(.96)}
.btn-primary{background:var(--volt);color:#0b0f1a;border-color:var(--volt);font-weight:700;letter-spacing:.05em}
.btn-primary:hover{background:var(--volt-dim);border-color:var(--volt-dim);color:#0b0f1a}
.btn-outline{background:transparent;border-color:var(--border2);color:var(--text2)}
.btn-outline:hover{border-color:var(--volt-border);color:var(--volt);background:var(--volt-subtle)}
.btn-ghost{background:transparent;border:none;color:var(--text3);padding:8px;min-height:36px}
.btn-ghost:hover{color:var(--text2);background:var(--surf2)}
.btn-danger{background:transparent;border:none;color:var(--red)}
.btn-danger:hover{background:var(--red-bg)}
.btn-sm{padding:8px 12px;font-size:12px;min-height:38px;border-radius:8px}
.vlabel{display:inline-flex;align-items:center;background:var(--volt-subtle);border:1px solid var(--volt-border);border-radius:6px;padding:3px 9px;font-size:11px;font-weight:700;color:var(--volt);letter-spacing:.08em;text-transform:uppercase}
.pill{display:inline-flex;align-items:center;background:var(--surf3);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--text2)}
.label{font-family:var(--ffc);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3)}
.sticky-header{background:var(--surf1);border-bottom:1px solid var(--border);padding:14px 16px;position:sticky;top:0;z-index:20}
#sync-badge{position:fixed;bottom:calc(16px + var(--safe-b));right:16px;z-index:99;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:4px 9px;border-radius:20px;border:1px solid var(--border2);background:var(--surf2);color:var(--text3);opacity:0;transition:opacity .4s;pointer-events:none}
#sync-badge.show{opacity:1}
#sync-badge.syncing{color:var(--volt);border-color:var(--volt-border)}
#sync-badge.synced{color:var(--green);border-color:oklch(84% .19 148 / 30%)}
#sync-badge.local{color:var(--text3);border-color:var(--border2)}
#sync-badge.error{color:var(--red);border-color:var(--red-bg)}
#ex-sheet{position:fixed;inset:0;background:rgba(0,0,0,.65);background:oklch(0% 0 0 / 65%);z-index:50;display:none;align-items:flex-end;-webkit-tap-highlight-color:transparent}
.sheet{background:var(--surf1);border-radius:var(--r3) var(--r3) 0 0;padding:20px 16px calc(24px + var(--safe-b));width:100%;max-height:82dvh;overflow-y:auto}
.sheet-handle{width:36px;height:4px;background:var(--surf4);border-radius:2px;margin:0 auto 20px}
.lib-row{display:flex;align-items:center;gap:10px;background:var(--surf2);border:1px solid var(--border);border-radius:var(--r2);padding:12px 14px;cursor:pointer;transition:var(--tr);touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.lib-row:active{background:var(--surf3);border-color:var(--volt-border)}
/* View transitions — fires only on view switches, not every render() */
::view-transition-old(root){animation:120ms ease-in both _vt-out}
::view-transition-new(root){animation:180ms ease-out both _vt-in}
@keyframes _vt-out{to{opacity:0}}
@keyframes _vt-in{from{opacity:0}}
/* Rail nav — hidden on mobile */
#rail{display:none}
/* Desktop ≥900px: left rail + wider content */
@media(min-width:900px){
  :root{--rail-w:220px}
  body{padding-left:var(--rail-w)}
  #app{max-width:720px;margin-left:0;padding-bottom:40px}
  #rail{
    display:flex;flex-direction:column;gap:2px;
    position:fixed;top:0;left:0;bottom:0;width:var(--rail-w);
    background:var(--surf1);border-right:1px solid var(--border);
    padding:24px 12px calc(24px + var(--safe-b));z-index:30;overflow-y:auto
  }
  #rail-logo{padding:4px 10px 20px;margin-bottom:8px;border-bottom:1px solid var(--border)}
  #rail-logo .label{font-size:9px;margin-bottom:3px}
  #rail-logo .wordmark{font-family:var(--ffc);font-size:22px;font-weight:700;color:var(--volt);letter-spacing:.02em;line-height:1}
  #rail button{
    width:100%;text-align:left;display:flex;align-items:center;gap:8px;
    background:transparent;border:1px solid transparent;color:var(--text2);
    border-radius:var(--r);padding:10px 12px;font-size:13px;font-weight:600;min-height:40px
  }
  #rail button:hover{background:var(--surf2);color:var(--text);border-color:var(--border)}
  #rail button.rail-active{background:var(--volt-subtle);color:var(--volt);border-color:var(--volt-border)}
  /* Bottom sheet → centered modal on desktop */
  #ex-sheet{align-items:center;justify-content:center}
  .sheet{width:min(480px,100%);border-radius:var(--r3);padding-bottom:24px;max-height:80dvh}
}
</style>
</head>
<body>
<nav id="rail">
  <div id="rail-logo">
    <div class="label">Training</div>
    <div class="wordmark">Iron Logic</div>
  </div>
  <button data-view="picker" onclick="STATE.view='picker';render()">Programs</button>
  <button data-view="history" onclick="goHistory()">History</button>
  <button onclick="Drive.requestDriveAccess()" title="Connect Google Drive">☁ Drive</button>
</nav>
<div id="app"></div>
<div id="sync-badge">Local</div>
<div id="ex-sheet" onclick="if(event.target===this)closeExSheet()"><div class="sheet"></div></div>
<script>
// ─────────────────────────────────────────────
//  GOOGLE DRIVE PERSISTENCE MODULE
//  Scope: drive.appdata (hidden app folder, not visible in Drive UI)
//  Replace DRIVE_CLIENT_ID with your OAuth 2.0 Web Client ID from
//  Google Cloud Console → APIs & Services → Credentials.
//  Authorized JS origins must include your site domain.
// ─────────────────────────────────────────────
const DRIVE_CLIENT_ID = '1047708481556-8cmfl178c0ufa6lalu34t8sd420nirjm.apps.googleusercontent.com'; // ← OAuth Client ID
const DRIVE_SCOPE     = 'https://www.googleapis.com/auth/drive.appdata';
const DRIVE_FILENAME  = 'workout-history.json';
const LS_DRIVE_TOKEN  = 'wl3_drive_token';
const LS_SYNC_TS      = 'wl3_sync_ts';

const Drive = (() => {
  let _token       = null;   // current access token string
  let _tokenExpiry = 0;      // ms timestamp when token expires
  let _fileId      = null;   // cached Drive file ID
  let _tokenClient = null;   // GIS token client
  let _saveTimer   = null;   // debounce handle
  let _pendingSave = null;   // history payload queued while no token

  // ── Sync badge ────────────────────────────────
  function badge(state, text) {
    const el = document.getElementById('sync-badge');
    if (!el) return;
    el.className = 'show ' + (state || '');
    el.textContent = text || state;
    clearTimeout(el._hide);
    if (state === 'synced') {
      el._hide = setTimeout(() => { el.className = ''; }, 3000);
    }
  }

  // ── Token helpers ─────────────────────────────
  function tokenValid() {
    return _token && Date.now() < _tokenExpiry - 30000;
  }

  function storeToken(token, expiresInSec) {
    _token       = token;
    _tokenExpiry = Date.now() + (expiresInSec || 3600) * 1000;
    try {
      localStorage.setItem(LS_DRIVE_TOKEN, JSON.stringify({ token: _token, expiry: _tokenExpiry }));
    } catch(e) {}
  }

  function loadCachedToken() {
    try {
      const raw = localStorage.getItem(LS_DRIVE_TOKEN);
      if (!raw) return false;
      const d = JSON.parse(raw);
      if (d && d.token && d.expiry && Date.now() < d.expiry - 30000) {
        _token       = d.token;
        _tokenExpiry = d.expiry;
        return true;
      }
    } catch(e) {}
    return false;
  }

  // ── GIS init ──────────────────────────────────
  function initTokenClient() {
    if (_tokenClient) return;
    if (!window.google?.accounts?.oauth2) return;
    _tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: DRIVE_CLIENT_ID,
      scope:     DRIVE_SCOPE,
      callback:  (resp) => {
        if (resp.error) {
          console.warn('[Drive] Token error:', resp.error);
          badge('error', 'Drive unavailable');
          return;
        }
        storeToken(resp.access_token, resp.expires_in);
        console.log('[Drive] Token granted');
        // Flush any queued save
        if (_pendingSave !== null) {
          const queued = _pendingSave;
          _pendingSave = null;
          saveWorkoutHistoryToDrive(queued);
        } else {
          // First auth — try to load from Drive
          loadWorkoutHistoryFromDrive().then(hist => {
            if (hist) mergeAndHydrateDriveHistory(hist);
          });
        }
      },
    });
  }

  // ── Drive REST helpers ────────────────────────
  async function driveRequest(url, options = {}) {
    if (!tokenValid()) return null;
    const res = await fetch(url, {
      ...options,
      headers: {
        'Authorization': `Bearer ${_token}`,
        ...(options.headers || {}),
      },
    });
    if (res.status === 401) {
      // Token rejected — clear and request fresh
      _token = null;
      _tokenExpiry = 0;
      try { localStorage.removeItem(LS_DRIVE_TOKEN); } catch(e) {}
      return null;
    }
    return res;
  }

  async function listAppDataFiles() {
    const res = await driveRequest(
      `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&fields=files(id,name,modifiedTime)&q=name%3D%22${encodeURIComponent(DRIVE_FILENAME)}%22`
    );
    if (!res || !res.ok) return [];
    const d = await res.json();
    return d.files || [];
  }

  async function downloadFile(fileId) {
    const res = await driveRequest(
      `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`
    );
    if (!res || !res.ok) return null;
    return await res.text();
  }

  async function createFile(jsonString) {
    const meta = JSON.stringify({ name: DRIVE_FILENAME, parents: ['appDataFolder'] });
    const body = new Blob([
      '--boundary\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n' + meta +
      '\r\n--boundary\r\nContent-Type: application/json\r\n\r\n' + jsonString +
      '\r\n--boundary--',
    ], { type: 'multipart/related; boundary=boundary' });
    const res = await driveRequest(
      'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',
      { method: 'POST', body }
    );
    if (!res || !res.ok) return null;
    const d = await res.json();
    return d.id || null;
  }

  async function updateFile(fileId, jsonString) {
    const res = await driveRequest(
      `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`,
      { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: jsonString }
    );
    return res && res.ok;
  }

  // ── Public: load from Drive ───────────────────
  async function loadWorkoutHistoryFromDrive() {
    if (!tokenValid()) return null;
    try {
      const files = await listAppDataFiles();
      if (!files.length) { console.log('[Drive] No history file found.'); return null; }
      _fileId = files[0].id;
      const raw = await downloadFile(_fileId);
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      if (!Array.isArray(parsed)) return null;
      console.log('[Drive] Loaded', parsed.length, 'sessions.');
      return parsed;
    } catch(e) {
      console.warn('[Drive] Load error:', e);
      return null;
    }
  }

  // ── Public: save to Drive (debounced 2 s) ─────
  function saveWorkoutHistoryToDrive(history) {
    clearTimeout(_saveTimer);
    _saveTimer = setTimeout(() => _doSave(history), 2000);
  }

  async function _doSave(history) {
    if (!tokenValid()) {
      console.log('[Drive] No valid token — queuing save.');
      _pendingSave = history;
      badge('local', 'Local only');
      return;
    }
    badge('syncing', 'Syncing…');
    try {
      const payload = JSON.stringify(history);
      if (!_fileId) {
        const files = await listAppDataFiles();
        _fileId = files.length ? files[0].id : null;
      }
      if (_fileId) {
        await updateFile(_fileId, payload);
      } else {
        _fileId = await createFile(payload);
      }
      try { localStorage.setItem(LS_SYNC_TS, Date.now().toString()); } catch(e) {}
      console.log('[Drive] Saved', history.length, 'sessions.');
      badge('synced', 'Synced ✓');
    } catch(e) {
      console.warn('[Drive] Save error:', e);
      badge('error', 'Sync failed');
    }
  }

  // ── Public: unified persist (local + Drive) ───
  function persistWorkoutHistory(history) {
    // localStorage is always written first (synchronous, safe)
    try { localStorage.setItem(LS_HIST, JSON.stringify(history)); } catch(e) {}
    // Drive sync is async / debounced — never blocks UX
    if (DRIVE_CLIENT_ID !== 'YOUR_GOOGLE_CLIENT_ID_HERE') {
      saveWorkoutHistoryToDrive(history);
    }
  }

  // ── Public: request Drive access (called once) ─
  function requestDriveAccess() {
    initTokenClient();
    if (!_tokenClient) { console.warn('[Drive] GIS not loaded yet.'); return; }
    _tokenClient.requestAccessToken({ prompt: 'consent' });
  }

  // ── Boot ──────────────────────────────────────
  async function init() {
    if (DRIVE_CLIENT_ID === 'YOUR_GOOGLE_CLIENT_ID_HERE') {
      console.log('[Drive] Client ID not set — Drive sync disabled.');
      badge('local', 'Local only');
      setTimeout(() => { const el = document.getElementById('sync-badge'); if (el) el.className = ''; }, 2500);
      return;
    }

    // Restore cached token silently
    const hasCached = loadCachedToken();

    // Wait for GIS to load (it's async)
    await new Promise(resolve => {
      if (window.google?.accounts?.oauth2) { resolve(); return; }
      const t = setInterval(() => {
        if (window.google?.accounts?.oauth2) { clearInterval(t); resolve(); }
      }, 100);
      setTimeout(() => { clearInterval(t); resolve(); }, 5000); // give up after 5 s
    });

    initTokenClient();

    if (hasCached) {
      console.log('[Drive] Resuming from cached token.');
      const drivHistory = await loadWorkoutHistoryFromDrive();
      if (drivHistory) mergeAndHydrateDriveHistory(drivHistory);
      else badge('synced', 'Drive ready');
    } else {
      badge('local', 'Local only');
      setTimeout(() => { const el = document.getElementById('sync-badge'); if (el) el.className = ''; }, 2500);
    }
  }

  return { init, requestDriveAccess, persistWorkoutHistory, saveWorkoutHistoryToDrive, badge };
})();

// Called after Drive load — merges Drive history with local, prefers newer
function mergeAndHydrateDriveHistory(driveHistory) {
  const localRaw = (() => { try { return JSON.parse(localStorage.getItem(LS_HIST)) || []; } catch(e) { return []; } })();
  // Build a map keyed by session id, preferring the entry with a later savedAt
  const map = new Map();
  [...localRaw, ...driveHistory].forEach(h => {
    const existing = map.get(h.id);
    if (!existing) { map.set(h.id, h); return; }
    const existingTs = existing.savedAt || existing.endedAt || '';
    const newTs      = h.savedAt || h.endedAt || '';
    if (newTs > existingTs) map.set(h.id, h);
  });
  const merged = [...map.values()].sort((a, b) => {
    return (b.savedAt || b.date || '') > (a.savedAt || a.date || '') ? 1 : -1;
  }).slice(0, 50);
  if (merged.length > 0) {
    STATE.history = merged;
    try { localStorage.setItem(LS_HIST, JSON.stringify(merged)); } catch(e) {}
    render(); // refresh UI with merged history
    console.log('[Drive] Merged history:', merged.length, 'sessions.');
  }
  Drive.badge('synced', 'Synced ✓');
}

// ─────────────────────────────────────────────
//  PROGRAM TEMPLATES
//  Edit this array to add/modify training days.
//  Each exercise: name, targetSets, targetRepRange, notes, restSeconds
// ─────────────────────────────────────────────

      {id:'overhead-press',       equipment:'barbell',    name:'Overhead Press',             targetSets:'3',targetRepRange:'6–8',  notes:'Full lockout. Brace hard.',restSeconds:150},
      {id:'chin-up',               equipment:'bodyweight', name:'Chin-up',                    targetSets:'3',targetRepRange:'6–10', notes:'Underhand grip, full dead hang. Drive elbows to hips. Add load when top of range is clean.',restSeconds:120},
      {id:'db-lateral-raise',     equipment:'dumbbell',   name:'DB Lateral Raise',           targetSets:'3',targetRepRange:'12–15',notes:'Slight forward lean, lead with elbows.',restSeconds:60},
      {id:'db-overhead-tricep-extension', equipment:'dumbbell', name:'DB Overhead Tricep Extension', targetSets:'3',targetRepRange:'10–15',notes:'Single or double DB. Elbows in, full overhead ROM. Control the eccentric.',restSeconds:60},
    ]
  },
  {
    id:'upper-b', label:'Upper B', tag:'Pull Focus', color:'#d4f500',
    description:'Vertical pull/push emphasis. Higher rep accessories.',
    exercises:[
      {id:'pull-up-weighted',     equipment:'bodyweight', name:'Pull-up / Weighted Pull-up', targetSets:'4',targetRepRange:'5–8',  notes:'Full dead hang. Add weight when top of range is clean.',restSeconds:180},
      {id:'incline-db-press',     equipment:'dumbbell',   name:'Incline DB Press',           targetSets:'4',targetRepRange:'8–10', notes:'30–45° incline. Control descent.',restSeconds:150},
      {id:'db-row',               equipment:'dumbbell',   name:'DB Row (One-Arm)',            targetSets:'3',targetRepRange:'8–12', notes:'Brace on bench, row to hip. Full stretch at bottom, squeeze at top. Both sides.',restSeconds:90},
      {id:'db-shoulder-press',    equipment:'dumbbell',   name:'DB Shoulder Press',          targetSets:'3',targetRepRange:'8–10', notes:'Seated or standing. Full ROM.',restSeconds:120},
      {id:'db-rear-delt-fly',     equipment:'dumbbell',   name:'DB Rear Delt Fly',           targetSets:'3',targetRepRange:'15–20',notes:'Hip hinge, soft elbow bend. Lead with elbow, squeeze rear delts at top.',restSeconds:60},
      {id:'db-curl',              equipment:'dumbbell',   name:'DB Curl',                    targetSets:'3',targetRepRange:'10–12',notes:'Supinate at top. No momentum.',restSeconds:60},
    ]
  },
  {
    id:'lower-a', label:'Lower A', tag:'Squat Focus', color:'#d4f500',

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
const LS_SESS      = 'wl3_session';
const LS_HIST      = 'wl3_history';
const LS_VIEW      = 'wl3_view';
const LS_EXERCISES = 'wl3_exercises';
const LS_ROTATION  = 'wl3_rotation';
const LS_SCHEMA_V1 = 'wl3_schema_v1';

let STATE = {
  view: 'picker',       // picker | session | history | preview
  session: null,        // active session object
  history: [],          // array of completed sessions
  previewIdx: null,
  timer: { seconds:0, running:false, interval:null },
};

// ─────────────────────────────────────────────
//  PERSISTENCE
// ─────────────────────────────────────────────
function persist(syncHistory = false) {
  try {
    localStorage.setItem(LS_SESS, JSON.stringify({
      view: STATE.view,
      session: STATE.session,
    }));
  } catch(e) {}
  // History is synced to Drive only when it actually changed (session end, delete)
  if (syncHistory) {
    Drive.persistWorkoutHistory(STATE.history);
  } else {
    try { localStorage.setItem(LS_HIST, JSON.stringify(STATE.history)); } catch(e) {}
  }
}

function hydrate() {
  try {
    const raw = localStorage.getItem(LS_SESS);
    const hist = localStorage.getItem(LS_HIST);
    if (hist) STATE.history = JSON.parse(hist) || [];
    if (raw) {
      const d = JSON.parse(raw);
      // Restore started-but-unfinished sessions, or unstarted drafts that have exercises
      const s = d.session;
      if (s && !s.endedAt && (s.startedAt || (s.exercises && s.exercises.length > 0))) {
        STATE.session = s;
        STATE.view = 'session';
        return;
      }
    }
  } catch(e) {}
  STATE.view = 'picker';
}

// ─────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────
const uid = () => Math.random().toString(36).slice(2,9);
const today = () => new Date().toISOString().slice(0,10);
const vibrate = (p=50) => { try { navigator.vibrate && navigator.vibrate(p); } catch(e){} };
const $ = id => document.getElementById(id);

function makeSet(n, prevWeight='', prevReps='') {
  return { id:uid(), setNumber:n, weight:prevWeight, reps:prevReps, rpe:'', completed:false, notes:'' };
}

function sessionFromProgram(prog) {
  return {
    id: uid(),
    programId: prog.id,
    title: prog.label,
    tag: prog.tag,
    date: today(),
    notes: '',
    startedAt: null,
    endedAt: null,
    exercises: prog.exercises.map(ex => ({
      id: uid(),
      exerciseId: ex.id || null,
      exerciseNameSnapshot: ex.name,
      equipment: ex.equipment || 'barbell',
      matchStatus: 'matched',
      suggestion: null,
      virtualWeight: null,
      wasReanchored: false,
      name: ex.name,
      targetSets: ex.targetSets,
      targetRepRange: ex.targetRepRange,
      notes: ex.notes,
      restSeconds: ex.restSeconds || 90,
      sets: Array.from({length: parseInt(ex.targetSets)||3}, (_,i) => makeSet(i+1)),
    }))
  };
}

function totalCompletedSets(sess) {
  if (!sess) return 0;
  return sess.exercises.reduce((a,ex) => a + ex.sets.filter(s=>s.completed).length, 0);
}

function saveToHistory(sess) {
  if (!sess) return;
  finalizeSessionExercises(sess);
  const entry = { ...sess, savedAt: new Date().toISOString() };
  // Replace existing entry with same id, or prepend
  const idx = STATE.history.findIndex(h => h.id === sess.id);
  if (idx >= 0) STATE.history[idx] = entry;
  else STATE.history.unshift(entry);
  if (STATE.history.length > 50) STATE.history = STATE.history.slice(0,50);
}

// ─────────────────────────────────────────────
//  TIMER
// ─────────────────────────────────────────────
function startTimer(sec) {
  if (STATE.timer.interval) clearInterval(STATE.timer.interval);
  STATE.timer.seconds = sec;
  STATE.timer.running = true;
  tickTimer();
  STATE.timer.interval = setInterval(tickTimer, 1000);
}
function resetTimer() {
  if (STATE.timer.interval) clearInterval(STATE.timer.interval);
  STATE.timer.seconds = 0;
  STATE.timer.running = false;
  renderTimerEl();
}
function tickTimer() {
  if (STATE.timer.seconds > 0) {
    STATE.timer.seconds--;
    renderTimerEl();
  } else {
    clearInterval(STATE.timer.interval);
    STATE.timer.running = false;
    vibrate([80,40,80]);
    renderTimerEl();
  }
}
function renderTimerEl() {
  const el = $('tdisplay'); if(!el) return;
  const m = Math.floor(STATE.timer.seconds/60);
  const s = STATE.timer.seconds % 60;
  el.textContent = `${m}:${s.toString().padStart(2,'0')}`;
  const done = !STATE.timer.running && STATE.timer.seconds===0;
  el.style.color = done ? 'var(--text3)' : STATE.timer.seconds<=10 ? 'var(--red)' : 'var(--volt)';
  const bar = $('tbar');
  if (bar) bar.style.width = done ? '0' : '100%';
}

// ─────────────────────────────────────────────
//  EXPORT CSV
// ─────────────────────────────────────────────
function exportCSV(sess) {
  if (!sess) return;
  const esc = v => `"${(v||'').toString().replace(/"/g,'""')}"`;
  const rows = [['Session','Date','Exercise','Set','Weight','Reps','RPE','Completed','Notes']];
  sess.exercises.forEach(ex => {
    ex.sets.forEach(set => {
      rows.push([esc(sess.title), sess.date, esc(ex.name), set.setNumber, set.weight||'', set.reps||'', set.rpe||'', set.completed?'yes':'no', esc(set.notes)]);
    });
  });
  const blob = new Blob([rows.map(r=>r.join(',')).join('\n')], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `workout_${sess.date}_${sess.title.replace(/\s+/g,'-').toLowerCase()}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
}

      <div style="font-size:11px;color:var(--text3);margin-top:auto">${p.exercises.length} exercises</div>
    </div>`).join('')}

  <button class="btn-outline" style="width:100%;margin-top:12px;min-height:44px;font-size:13px;padding:10px 16px" onclick="loadBlank()">+ Start blank session</button>
</div>`;
}

function loadProgram(id) {
  const prog = PROGRAMS.find(p => p.id === id);
  if (!prog) return;
  // If active session exists, ask before replacing
  if (STATE.session && STATE.session.startedAt && !STATE.session.endedAt) {
    if (!confirm('You have an active session. Start a new one? (Current session will be saved to history.)')) return;
    saveToHistory(STATE.session);
  }
  STATE.session = sessionFromProgram(prog);
  buildSessionSuggestions(STATE.session);
  advanceRotation();
  STATE.view = 'session';
  persist();
  render();
}

function loadBlank() {
  if (STATE.session && STATE.session.startedAt && !STATE.session.endedAt) {
    if (!confirm('You have an active session. Start a new one?')) return;
    saveToHistory(STATE.session);
  }
  STATE.session = {
    id:uid(), programId:null, title:'', tag:'', date:today(),
    notes:'', startedAt:null, endedAt:null, exercises:[]
  };
  STATE.view = 'session';
  persist();
  render();
}

  </div>

    <div style="height:4px;background:var(--surf4);border-radius:2px;overflow:hidden;margin-bottom:4px">

${sess.exercises.map((ex,i) => rExercise(ex,i)).join('')}
<div style="padding:14px 16px 0">

}

function startSession() {
  STATE.session.startedAt = new Date().toISOString();
  persist();
  render();
}

function endSession() {
  if (!confirm('End and save this session?')) return;
  STATE.session.endedAt = new Date().toISOString();
  saveToHistory(STATE.session);
  persist(true); // true = sync history to Drive
  render();
}

// ─────────────────────────────────────────────

function submitExToSession(save) {
  const nameEl = document.getElementById('ex-name-inp');
  const setsEl = document.getElementById('ex-sets-inp');
  const repsEl = document.getElementById('ex-reps-inp');
  const errEl  = document.getElementById('ex-err');
  const name   = nameEl ? nameEl.value.trim() : '';

  if (!name) {
    if (errEl) errEl.textContent = 'Exercise name is required.';
    if (nameEl) nameEl.focus();
    return;
  }
  if (errEl) errEl.textContent = '';

  const sets = setsEl ? setsEl.value.trim() : '';
  const reps = repsEl ? repsEl.value.trim() : '';

  if (save) {
    const lib = loadCustomExercises();
    const isDupe = lib.some(e => e.name.trim().toLowerCase() === name.toLowerCase());
    if (!isDupe) {
      lib.push({ id: uid(), name, targetSets: sets, targetRepRange: reps, notes: '', restSeconds: 90, equipment: 'dumbbell' });
      saveCustomExercises(lib);
    }
  }

  STATE.session.exercises.push({
    id: uid(),
    exerciseId: null,
    exerciseNameSnapshot: name,
    equipment: 'dumbbell',
    matchStatus: 'fallback-new',
    suggestion: null,
    virtualWeight: null,
    wasReanchored: false,
    name,
    targetSets: sets, targetRepRange: reps,
    notes: '', restSeconds: 90, sets: []
  });
  persist();
  closeExSheet();
  render();
  setTimeout(() => {
    const cards = document.querySelectorAll('[data-exid]');
    if (cards.length) { const inp = cards[cards.length-1].querySelector('input'); if(inp) inp.focus(); }
  }, 80);
}

function addExFromLib(id) {
  const ex = loadCustomExercises().find(e => e.id === id);
  if (!ex || !STATE.session) return;
  const newEx = {
    id: uid(),
    exerciseId: ex.id || null,
    exerciseNameSnapshot: ex.name,
    equipment: ex.equipment || 'dumbbell',
    matchStatus: 'fallback-new',
    suggestion: null,
    virtualWeight: null,
    wasReanchored: false,
    name: ex.name,
    targetSets: ex.targetSets, targetRepRange: ex.targetRepRange,
    notes: ex.notes || '', restSeconds: ex.restSeconds || 90, sets: []
  };
  STATE.session.exercises.push(newEx);
  buildSessionSuggestions(STATE.session);

}

// ─────────────────────────────────────────────
//  IRON LOGIC — PROGRESSION ENGINE
// ─────────────────────────────────────────────
const DB_CEILING       = 40;
const BARBELL_MAX      = 1000;
const STARTING_WEIGHTS = {
  'barbell-bench-press':       95,
  'barbell-row':               95,
  'overhead-press':            65,
  'barbell-back-squat':        95,
  'romanian-deadlift-barbell': 95,
  'pull-up-weighted':           0,
  'incline-db-press':          25,
  'db-shoulder-press':         20,
  'db-curl':                   15,
  'db-lateral-raise':          15,
  'db-bulgarian-split-squat':  20,
  'db-walking-lunge':          20,
  'chin-up':                    0,
  'db-overhead-tricep-extension': 20,
  'db-row':                    35,
  'db-rear-delt-fly':          15,
  'barbell-front-squat':       65,
  'lying-db-leg-curl':         15,
};

function parseGymInput(val) {
  const s = String(val).trim();
  if (/,/.test(s)) return null;       // reject comma-decimal (e.g. "50,5" → would become 505)
  if (/kg/i.test(s)) return null;     // reject kg suffix (app is lb-only)
  const n = parseFloat(s.replace(/[^\d.-]/g, ''));
  return (isNaN(n) || n < 0) ? null : n;
}

function normalizeExerciseName(name) {
  return String(name).trim().toLowerCase()
    .replace(/[^\w\s-]/g, ' ')  // remove non-word-non-hyphen chars (parens, slashes); keep hyphens
    .replace(/\s+/g, '-')        // spaces → hyphens
    .replace(/-+/g, '-')         // collapse multiple hyphens
    .replace(/^-|-$/g, '');      // strip leading/trailing hyphens
}

function snapWeight(val, equipment) {
  const inc = (equipment === 'barbell' && val >= 100) ? 5 : 2.5;
  return Math.round(val / inc) * inc;
}

function buildExerciseRegistry() {
  const byId   = new Map();
  const bySlug = new Map();
  const reg = ex => {
    if (ex.id) byId.set(ex.id, ex);
    const slug = normalizeExerciseName(ex.name);
    if (slug && !bySlug.has(slug)) bySlug.set(slug, ex);
  };
  PROGRAMS.forEach(p => p.exercises.forEach(reg));
  loadCustomExercises().forEach(ex => reg({ ...ex, equipment: ex.equipment || 'dumbbell' }));
  return { byId, bySlug };
}

// Returns { set, exercise, session } for the most-recent completed set, or null.
function getLastSet(exerciseId, normalizedSlug, history) {
  for (let si = 0; si < history.length; si++) {
    const sess = history[si];
    for (let ei = 0; ei < sess.exercises.length; ei++) {
      const ex = sess.exercises[ei];
      const idMatch   = exerciseId && ex.exerciseId === exerciseId;
      const slugMatch = !idMatch && normalizedSlug && normalizeExerciseName(ex.name) === normalizedSlug;
      if (idMatch || slugMatch) {
        const done = (ex.sets || []).filter(s => s.completed && s.weight != null && s.reps != null);
        if (done.length) return { set: done[done.length - 1], exercise: ex, session: sess };
      }
    }
  }
  return null;
}

// Returns { suggestedWeight, virtualWeight, technique, hint } or null.
function computeProgression(lastRecord, equipment, exerciseId) {
  if (!lastRecord) {
    const startW = STARTING_WEIGHTS[exerciseId] ?? null;
    return startW !== null
      ? { suggestedWeight: startW, virtualWeight: startW, technique: null, hint: 'Starting weight' }
      : null;
  }
  const { set, exercise } = lastRecord;
  const weight = parseGymInput(set.weight);
  const rpe    = parseGymInput(set.rpe);
  if (weight === null) return null;
  if (weight <= 0 && equipment !== 'bodyweight') return null;

  const parsedVirtual = parseGymInput(exercise.virtualWeight);
  const prevVirtual = (parsedVirtual !== null && parsedVirtual > 0) ? parsedVirtual : weight;
  const newVirtual  = (rpe === null || rpe <= 8) ? prevVirtual * 1.025 : prevVirtual;

  const prevSnapped = snapWeight(weight, equipment);

  if (equipment === 'dumbbell') {
    const gap = newVirtual - DB_CEILING;
    if (gap > 0) {
      let technique = gap < 5 ? 'Tempo 3-1-1-0' : gap <= 15 ? 'Myo-reps' : 'Myo-reps+';
      return { suggestedWeight: snapWeight(Math.min(newVirtual, DB_CEILING), equipment), virtualWeight: newVirtual, technique, hint: null, isRepTarget: false };
    }
  }

  const snapped = snapWeight(Math.min(newVirtual, BARBELL_MAX), equipment);
  return { suggestedWeight: snapped, virtualWeight: newVirtual, technique: null, hint: null, isRepTarget: snapped === prevSnapped };
}

// Mutates each session exercise with suggestion + matchStatus.
function buildSessionSuggestions(session) {
  if (!session || !session.exercises) return;
  const history  = STATE.history;
  const registry = buildExerciseRegistry();
  session.exercises.forEach(ex => {
    const regEx     = ex.exerciseId ? registry.byId.get(ex.exerciseId) : registry.bySlug.get(normalizeExerciseName(ex.name));
    const equipment = ex.equipment || regEx?.equipment || 'barbell';
    if (!ex.matchStatus || ex.matchStatus === 'matched') {
      ex.matchStatus = regEx ? 'matched' : (ex.exerciseId ? 'fallback-unresolved' : 'fallback-new');
    }
    const lastRecord = getLastSet(ex.exerciseId, normalizeExerciseName(ex.name), history);
    const prog = computeProgression(lastRecord, equipment, ex.exerciseId);
    ex.suggestion    = prog || null;
    ex.virtualWeight = prog ? prog.virtualWeight : null;
  });
}

// Returns HTML hint string for an exercise card.
function rSuggestionHint(ex) {
  if (ex.matchStatus === 'fallback-unresolved') {
    return `<div style="margin-top:6px;font-size:12px;color:#f5a623;background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.25);border-radius:6px;padding:6px 10px">⚠ Exercise not recognized — no progression data. Log a set to begin tracking.</div>`;
  }
  const s = ex.suggestion;
  if (!s) return '';
  if (s.isRepTarget) {
    return `<div style="margin-top:6px;font-size:12px;color:var(--text2)">Hold <span style="font-weight:700;color:var(--text)">~${s.suggestedWeight} lb</span> <span style="color:var(--text3)">— target +1 rep</span></div>`;
  }
  const tag  = s.technique ? `<span style="margin-left:6px;font-size:10px;color:var(--volt);background:var(--volt-subtle);border:1px solid var(--volt-border);border-radius:4px;padding:1px 6px;font-weight:700;letter-spacing:.06em;text-transform:uppercase">${s.technique}</span>` : '';
  const hint = s.hint ? `<span style="color:var(--text3)"> · ${s.hint}</span>` : '';
  return `<div style="margin-top:6px;font-size:12px;color:var(--text2)">Suggested: <span style="font-weight:700;color:var(--text)">~${s.suggestedWeight} lb</span>${tag}${hint}</div>`;
}

// Writes virtualWeight back to history records. Called at saveToHistory().
function finalizeSessionExercises(sess) {
  if (!sess || !sess.exercises) return;
  sess.exercises.forEach(ex => {
    const done = (ex.sets || []).filter(s => s.completed);
    if (!done.length) return;
    const logged = parseGymInput(done[done.length - 1].weight);
    if (logged === null) return;
    const suggested = ex.suggestion ? ex.suggestion.suggestedWeight : null;
    if (suggested !== null && Math.abs(logged - suggested) > Math.max(suggested * 0.10, 5.0)) {
      const atCeiling = ex.equipment === 'dumbbell' &&
        logged >= DB_CEILING - 0.5 && logged <= DB_CEILING + 0.5;
      if (atCeiling && ex.suggestion && ex.suggestion.virtualWeight != null) {
        ex.virtualWeight = ex.suggestion.virtualWeight;
        ex.wasReanchored = false;
      } else {
        ex.virtualWeight = logged;
        ex.wasReanchored = true;
      }
    }
    if (ex.virtualWeight == null) ex.virtualWeight = logged;
  });
}

// ─────────────────────────────────────────────
//  ROTATION TRACKER
// ─────────────────────────────────────────────
const ROTATION_ORDER = ['upper-a', 'upper-b', 'lower-a', 'lower-b'];

function getRotation() {
  try { const raw = localStorage.getItem(LS_ROTATION); if (raw) return JSON.parse(raw); } catch(e) {}
  return { order: ROTATION_ORDER.slice(), index: 0 };
}
function saveRotation(rot) { try { localStorage.setItem(LS_ROTATION, JSON.stringify(rot)); } catch(e) {} }
function advanceRotation() {
  const rot = getRotation();
  rot.index = (rot.index + 1) % rot.order.length;
  saveRotation(rot);
}
function getNextProgramId() {
  const rot = getRotation();
  return rot.order[rot.index % rot.order.length];
}

function rNextWorkoutBanner() {
  const nextId   = getNextProgramId();
  const nextProg = PROGRAMS.find(p => p.id === nextId);
  if (!nextProg) return '';
  return `<div style="margin-bottom:10px;min-height:72px;background:var(--volt-subtle);border:1px solid var(--volt-border);border-radius:var(--r2);padding:12px 14px;display:flex;align-items:center;justify-content:space-between">
    <div>
      <div style="font-size:11px;color:var(--volt);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:2px">Up Next</div>
      <div style="font-size:14px;font-weight:600">${nextProg.label} <span style="font-weight:400;color:var(--text2)">· ${nextProg.tag}</span></div>
    </div>
    <button class="btn-sm btn-primary" onclick="loadProgram('${nextProg.id}')">Start →</button>
  </div>`;
}

// ─────────────────────────────────────────────
//  MIGRATION — DRY RUN + APPLY
// ─────────────────────────────────────────────
function runMigrationDryRun(history) {
  const registry = buildExerciseRegistry();
  const rows = history.flatMap(sess =>
    (sess.exercises || []).map(ex => {
      const slug = normalizeExerciseName(ex.name);
      const match = registry.bySlug.get(slug);
      return {
        session: sess.title || sess.id,
        date: sess.date,
        name: ex.name,
        exerciseId_before: ex.exerciseId || null,
        exerciseId_after:  ex.exerciseId || (match ? match.id : null),
        status: ex.exerciseId ? 'already-set' : match ? 'will-match' : 'unresolved',
      };
    })
  );
  console.group('[Iron Logic] Migration Dry Run — verify before/after');
  console.table(rows);
  console.groupEnd();
}

function applyMigration(history) {
  const registry = buildExerciseRegistry();
  history.forEach(sess => {
    (sess.exercises || []).forEach(ex => {
      if (!ex.exerciseId) {
        const match = registry.bySlug.get(normalizeExerciseName(ex.name));
        ex.exerciseId           = match ? match.id : null;
        ex.exerciseNameSnapshot = ex.exerciseNameSnapshot || ex.name;
        ex.equipment            = ex.equipment || (match ? match.equipment : 'barbell');
        ex.matchStatus          = match ? 'matched' : 'fallback-unresolved';
      }
      (ex.sets || []).forEach(s => {
        const w = parseGymInput(s.weight); if (w !== null) s.weight = w;
        const r = parseGymInput(s.reps);   if (r !== null) s.reps   = r;
        const rpe = parseGymInput(s.rpe);  if (rpe !== null) s.rpe  = rpe;
      });
    });
  });
}

function runMigration() {
  try {
    if (localStorage.getItem(LS_SCHEMA_V1)) return;
    if (!STATE.history || STATE.history.length === 0) {
      localStorage.setItem(LS_SCHEMA_V1, '1');
      return;
    }
    runMigrationDryRun(STATE.history);
    applyMigration(STATE.history);
    try { localStorage.setItem(LS_HIST, JSON.stringify(STATE.history)); } catch(e) {}
    localStorage.setItem(LS_SCHEMA_V1, '1');
    console.log('[Iron Logic] Migration applied successfully.');
  } catch(e) {
    console.warn('[Iron Logic] Migration error:', e);
    try { localStorage.setItem(LS_SCHEMA_V1, 'error'); } catch(_) {}
  }
}

// ─────────────────────────────────────────────
//  BACKUP / RESTORE
// ─────────────────────────────────────────────
function exportBackup() {
  const payload = {
    version: 1,
    exportedAt: new Date().toISOString(),
    history: STATE.history,
    customExercises: loadCustomExercises(),
    rotation: getRotation(),
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `iron-logic-backup-${today()}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function importBackup(event) {
  const file = event.target.files && event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data.history)) throw new Error('Invalid backup format — missing history array');
      if (!confirm(`Import ${data.history.length} sessions? This merges with existing history.`)) return;
      const map = new Map();
      [...STATE.history, ...data.history].forEach(h => {
        const ex = map.get(h.id);
        if (!ex) { map.set(h.id, h); return; }
        if ((h.savedAt || h.endedAt || '') > (ex.savedAt || ex.endedAt || '')) map.set(h.id, h);
      });
      STATE.history = [...map.values()]
        .sort((a, b) => (b.savedAt || b.date || '') > (a.savedAt || a.date || '') ? 1 : -1)
        .slice(0, 50);
      if (Array.isArray(data.customExercises)) saveCustomExercises(data.customExercises);
      persist(true);
      alert(`Imported. ${STATE.history.length} sessions in history.`);
      render();
    } catch(err) {
      alert('Import failed: ' + err.message);
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

// ─────────────────────────────────────────────
//  SESSION MUTATIONS
// ─────────────────────────────────────────────
function addExercise() {
  STATE.session.exercises.push({id:uid(),exerciseId:null,exerciseNameSnapshot:'',equipment:'barbell',matchStatus:'fallback-new',suggestion:null,virtualWeight:null,wasReanchored:false,name:'',targetSets:'',targetRepRange:'',notes:'',restSeconds:90,sets:[]});
  persist(); render();
  setTimeout(()=>{ const els=document.querySelectorAll('[data-exid] input'); if(els.length) els[els.length-4]&&els[els.length-4].focus(); },80);
}

function removeEx(id) {
  STATE.session.exercises = STATE.session.exercises.filter(e=>e.id!==id);
  persist(); render();
}

function moveEx(idx, dir) {
  const t = idx+dir;
  if (t<0||t>=STATE.session.exercises.length) return;
  [STATE.session.exercises[idx],STATE.session.exercises[t]] = [STATE.session.exercises[t],STATE.session.exercises[idx]];
  persist(); render();
}

function addSet(exId) {
  const ex = STATE.session.exercises.find(e=>e.id===exId); if(!ex) return;
  const last = ex.sets[ex.sets.length-1];
  ex.sets.push(makeSet(ex.sets.length+1, last?last.weight:'', last?last.reps:''));
  vibrate(); persist(); render();
  setTimeout(()=>{ const ws=document.querySelectorAll(`[data-exid="${exId}"] input[inputmode="decimal"]`); if(ws.length) ws[ws.length-2]&&ws[ws.length-2].focus(); },80);
}

function removeSet(exId, setId) {
  const ex = STATE.session.exercises.find(e=>e.id===exId); if(!ex) return;
  ex.sets = ex.sets.filter(s=>s.id!==setId);
  ex.sets.forEach((s,i)=>s.setNumber=i+1);
  persist(); render();
}

function toggleSet(exId, setId) {
  const ex = STATE.session.exercises.find(e=>e.id===exId); if(!ex) return;
  const set = ex.sets.find(s=>s.id===setId); if(!set) return;
  set.completed = !set.completed;
  if (set.completed) {
    // Cast-on-write: coerce string inputs to numbers at the completion boundary
    const w = parseGymInput(set.weight); if (w !== null) set.weight = w;
    const r = parseGymInput(set.reps);   if (r !== null) set.reps   = r;
    const rpe = parseGymInput(set.rpe);  if (rpe !== null) set.rpe  = rpe;
    vibrate(70);
  }
  persist(); render();
}

// ─────────────────────────────────────────────
//  HISTORY ACTIONS
// ─────────────────────────────────────────────
function goHistory() { STATE.view='history'; render(); }
function previewSession(idx) { STATE.previewIdx=idx; STATE.view='preview'; render(); }
function deleteHistory(idx) {
  if (!confirm('Delete this session?')) return;
  STATE.history.splice(idx,1);
  persist(true); // true = sync history to Drive
  render();
}

// ─────────────────────────────────────────────
//  MAIN RENDER
// ─────────────────────────────────────────────
function render() {
  const app = $('app');
  const switching = app.dataset.view && app.dataset.view !== STATE.view;

  const doRender = () => {
    switch(STATE.view) {
      case 'picker':  app.innerHTML = rPicker(); break;
      case 'session': app.innerHTML = rSession(); break;
      case 'history': app.innerHTML = rHistory(); break;
      case 'preview': app.innerHTML = rPreview(STATE.previewIdx); break;
      default:        app.innerHTML = rPicker();
    }
    if (STATE.view==='session') renderTimerEl();
    app.dataset.view = STATE.view;
    document.querySelectorAll('#rail button[data-view]').forEach(b => {
      b.classList.toggle('rail-active', b.dataset.view === STATE.view);
    });
  };

  if (switching && document.startViewTransition) {
    document.startViewTransition(doRender);
  } else {
    doRender();
  }
}

// ─────────────────────────────────────────────
//  BOOT
// ─────────────────────────────────────────────
hydrate();
runMigration();
render();
Drive.init(); // async — silently attempts Drive auth restore
</script>
